<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airsell Cargo | Manifest Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Airsell Cargo</div>
        <nav class="nav">
            <ul class="nav__list">
                <li><a href="#" class="nav__link">Dashboard</a></li>
                <li><a href="#" class="nav__link">Shipments</a></li>
                <li><a href="#" class="nav__link">Manifests</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard">
        <section class="status-panel">
            <h1 class="status-panel__title">Current Shipments</h1>
            
            <!-- Individual Tracking Card -->
            <article class="card card--active">
                <div class="card__header">
                    <span class="card__id">MAWB: 071-12345678</span>
                    <span class="card__status badge--green">In Transit</span>
                </div>
                <div class="card__body">
                    <p><strong>Origin:</strong> HGA (Hargeisa)</p>
                    <p><strong>Destination:</strong> DXB (Dubai)</p>
                </div>
                <div class="card__footer">
                    <button class="btn btn--primary">View Manifest</button>
                </div>
            </article>
        </section>
    </main>

</body>
</html>
