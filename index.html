<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airsell Cargo | Dashboard</title>
    <!-- This line connects your CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Airsell Cargo</div>
        <nav class="nav">
            <ul class="nav__list">
                <li><a href="#" class="nav__link">Dashboard</a></li>
                <li><a href="#" class="nav__link">Shipments</a></li>
                <li><a href="#" class="nav__link">Manifests</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-container">
        <h1>Current Shipments</h1>
        
        <div class="shipment-card">
            <div class="shipment-card__header">
                <span class="awb-number">MAWB: 071-12345678</span>
                <span class="status-badge">In Transit</span>
            </div>
            <div class="shipment-card__details">
                <p><strong>Origin:</strong> HGA (Hargeisa)</p>
                <p><strong>Destination:</strong> DXB (Dubai)</p>
            </div>
            <button class="btn-primary">View Manifest</button>
        </div>
    </main>

</body>
</html>
